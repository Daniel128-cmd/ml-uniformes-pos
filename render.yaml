# render.yaml — Blueprint de despliegue para Render.com
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ml-uniformes-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free                   # cambia a "starter" ($7/mes) para más RAM
    region: oregon               # o "frankfurt" si prefieres Europa / más cerca

    # Variables de entorno
    envVars:
      - key: PORT
        value: 10000             # Render asigna el puerto dinámicamente, esto es por si acaso

    # Disco persistente para la base de datos SQLite
    disk:
      name: ml-pedidos-data
      mountPath: /data
      sizeGB: 1                  # 1 GB es suficiente para SQLite + PDFs generados
